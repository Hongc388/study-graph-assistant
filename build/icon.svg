<!-- App icon source (Concept A, "Learning Path"): a prerequisite path of graph
     nodes climbing toward one glowing amber node — the topic being mastered.
     Geometry follows Apple's icon grid: 824px artwork centered on a 1024px
     transparent canvas, ~185px corner radius. Rendered to build/icon.icns by
     scripts/make-icns.sh; edit this file, re-run the script, commit both. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="ground" cx="50%" cy="36%" r="80%">
      <stop offset="0%" stop-color="#1d2340"/>
      <stop offset="100%" stop-color="#0c0f1e"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#5d6bff"/>
      <stop offset="100%" stop-color="#8f7bff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb454" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb454" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#ground)"/>
  <g transform="translate(100 100) scale(1.609375)">
    <g stroke="#3d4468" stroke-width="8" stroke-linecap="round">
      <line x1="238" y1="312" x2="332" y2="238"/>
      <line x1="136" y1="374" x2="208" y2="204"/>
    </g>
    <g stroke="url(#edge)" stroke-width="14" stroke-linecap="round">
      <line x1="136" y1="374" x2="238" y2="312"/>
      <line x1="238" y1="312" x2="208" y2="204"/>
      <line x1="208" y1="204" x2="332" y2="238"/>
      <line x1="332" y1="238" x2="368" y2="132"/>
    </g>
    <circle cx="136" cy="374" r="26" fill="#aeb6ff"/>
    <circle cx="238" cy="312" r="26" fill="#aeb6ff"/>
    <circle cx="208" cy="204" r="26" fill="#aeb6ff"/>
    <circle cx="332" cy="238" r="26" fill="#aeb6ff"/>
    <circle cx="368" cy="132" r="70" fill="url(#glow)"/>
    <circle cx="368" cy="132" r="32" fill="#ffb454"/>
  </g>
</svg>
